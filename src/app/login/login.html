<div class="auth-shell">
  <div class="row g-4 align-items-center">
    <div class="col-12">
      <div class="brand-pill mb-3">Acesso do cliente</div>
      <h2 class="h3 fw-bold mb-2">Entre para acompanhar seus pedidos</h2>
      <p class="muted-copy mb-0">
        Use seu e-mail e senha para acessar a area do cliente com um formulario mais limpo e responsivo.
      </p>
    </div>

    <div class="col-12">
      <div class="login-box rounded-5 p-4 p-lg-5">
        <form class="d-grid gap-3">
          <div>
            <label for="email" class="form-label fw-semibold">Email</label>
            <input id="email" type="email" class="form-control" placeholder="voce@exemplo.com">
          </div>

          <div>
            <label for="senha" class="form-label fw-semibold">Senha</label>
            <input id="senha" type="password" class="form-control" placeholder="Digite sua senha">
          </div>

          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="small muted-copy">Acesso rapido e seguro para continuar comprando.</span>
            <a routerLink="/cadastro" class="small fw-semibold text-decoration-none">Criar conta</a>
          </div>

          <button type="submit" class="btn rt-btn-primary btn-lg rounded-pill mt-2">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
