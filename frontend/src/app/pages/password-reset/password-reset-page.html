<section class="reset-page">
  <div class="reset-page__intro">
    <span class="eyebrow">Recuperar senha</span>
    <h1>Troque sua senha com um codigo temporario</h1>
    <p>
      Informe o email cadastrado, use o codigo recebido e escolha uma nova senha para voltar a
      acessar a conta.
    </p>
  </div>

  <div class="reset-grid">
    <form class="reset-card" [formGroup]="requestForm" (ngSubmit)="requestCode()">
      <div>
        <span class="eyebrow">Etapa 1</span>
        <h2>Solicitar codigo</h2>
      </div>

      <label>
        <span>Email cadastrado</span>
        <input type="email" formControlName="email" placeholder="voce@exemplo.com" />
        <small *ngIf="requestForm.controls.email.touched && requestForm.controls.email.invalid"
          >Informe um email valido.</small
        >
      </label>

      <button type="submit" [disabled]="isRequesting">
        {{ isRequesting ? 'Enviando...' : 'Enviar codigo' }}
      </button>
      <p class="reset-message" *ngIf="requestMessage">{{ requestMessage }}</p>
    </form>

    <form class="reset-card" [formGroup]="resetForm" (ngSubmit)="resetPassword()">
      <div>
        <span class="eyebrow">Etapa 2</span>
        <h2>Criar nova senha</h2>
      </div>

      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="voce@exemplo.com" />
      </label>

      <label>
        <span>Codigo de 6 digitos</span>
        <input
          type="text"
          formControlName="code"
          maxlength="6"
          inputmode="numeric"
          placeholder="000000"
        />
        <small *ngIf="resetForm.controls.code.touched && resetForm.controls.code.invalid"
          >Informe o codigo de 6 digitos.</small
        >
      </label>

      <label>
        <span>Nova senha</span>
        <input type="password" formControlName="newPassword" placeholder="Minimo de 6 caracteres" />
      </label>

      <label>
        <span>Confirmar senha</span>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Repita a nova senha"
        />
      </label>

      <button type="submit" [disabled]="isResetting">
        {{ isResetting ? 'Alterando...' : 'Alterar senha' }}
      </button>
      <p class="reset-message" *ngIf="resetMessage">{{ resetMessage }}</p>
    </form>
  </div>

  <a routerLink="/login" class="reset-login">Voltar para login</a>
</section>
